<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post card overlay mockup</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #f5f1ea; color: #1f1b16; padding: 2rem; }
  h2 { margin-bottom: 1rem; font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: #7a7268; }
  .row { display: flex; gap: 2rem; margin-bottom: 3rem; flex-wrap: wrap; }

  /* shared card base */
  .post-card {
    border-radius: 10px; overflow: hidden;
    background: #fbf9f5; border: 1px solid #e3ddd3;
    width: 340px; position: relative; cursor: pointer;
    transition: box-shadow .15s, transform .15s;
  }
  .post-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-2px); }
  .post-card a.card-link {
    position: absolute; inset: 0; z-index: 1;
  }
  .post-card-body { padding: 1rem 1.25rem 1.25rem; }
  .post-card-body h3 { font-size: 1.2rem; margin: .35rem 0 .5rem; line-height: 1.3; color: #1f1b16; }
  .post-card-body p { font-size: .88rem; color: #7a7268; line-height: 1.55; }
  .tag { display: inline-block; font-size: .75rem; background: #efeae0; color: #7a7268; border-radius: 4px; padding: .1rem .4rem; text-decoration: none; }

  /* ── CURRENT: meta above title in card body ── */
  .current .post-cover img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .current .post-kicker { display: flex; align-items: center; gap: .5rem; font-size: .8rem; color: #7a7268; margin-bottom: .1rem; }

  /* ── NEW: meta overlaid on image ── */
  .overlay .post-cover {
    position: relative; display: block;
  }
  .overlay .post-cover img { width: 100%; height: 200px; object-fit: cover; display: block; }
  .overlay .post-kicker {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: .5rem;
    padding: .6rem .85rem;
    background: linear-gradient(to top, rgba(0,0,0,.55) 0%, transparent 100%);
    font-size: .78rem; color: rgba(255,255,255,.9);
  }
  .overlay .post-kicker .tag {
    background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.3);
  }
</style>
</head>
<body>

<h2>Current</h2>
<div class="row">
  <article class="post-card current">
    <a href="#" class="card-link" aria-label="Dirty Stinking Animals"></a>
    <a href="#" class="post-cover">
      <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=680&q=80" alt="">
    </a>
    <div class="post-card-body">
      <div class="post-kicker">
        <time>May 14, 2026</time>
        <span class="tag">travel</span>
        <span class="tag">nature</span>
      </div>
      <h3>Dirty Stinking Animals</h3>
      <p>A short excerpt about the post goes here, giving the reader a taste of what's inside.</p>
    </div>
  </article>
</div>

<h2>Overlay</h2>
<div class="row">
  <article class="post-card overlay">
    <a href="#" class="card-link" aria-label="Dirty Stinking Animals"></a>
    <div class="post-cover">
      <img src="https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?w=680&q=80" alt="">
      <div class="post-kicker">
        <time>May 14, 2026</time>
        <span class="tag">travel</span>
        <span class="tag">nature</span>
      </div>
    </div>
    <div class="post-card-body">
      <h3>Dirty Stinking Animals</h3>
      <p>A short excerpt about the post goes here, giving the reader a taste of what's inside.</p>
    </div>
  </article>
</div>

</body>
</html>
